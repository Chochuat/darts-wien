<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dart" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4e4e7"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="22" fill="#e11d48" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="15" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="8" fill="#e11d48"/>
  <circle cx="32" cy="32" r="3" fill="#fbbf24"/>
  <!-- dart shaft -->
  <line x1="44" y1="12" x2="33" y2="31" stroke="url(#shaft)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- dart flight -->
  <polygon points="44,12 42,6 46,8 48,4 46,10" fill="url(#dart)" stroke="#d97706" stroke-width="0.5"/>
</svg>
